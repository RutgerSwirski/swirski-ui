name: LLM context

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-llm-context:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate docs and registry artifacts
        run: |
          pnpm docs:metadata
          pnpm llms:build
          pnpm registry:shadcn

      - name: Check generated files are committed
        run: |
          git diff --exit-code -- \
            apps/docs/content/generated-props.json \
            apps/docs/public/llms.txt \
            apps/docs/public/llms-full.txt \
            apps/docs/public/registry.json \
            apps/docs/public/r
